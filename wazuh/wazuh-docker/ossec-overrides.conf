<!-- Wazuh Manager ossec.conf overrides for ISO 27001 Toolkit -->
<!-- These blocks are appended to the default ossec.conf -->

<!-- Forward alerts level 7+ to the Glue Layer webhook -->
<integration>
  <name>custom-webhook-integration.sh</name>
  <hook_url>http://glue-webhook:9000/webhook</hook_url>
  <level>7</level>
  <alert_format>json</alert_format>
</integration>

<!-- File Integrity Monitoring — monitor critical paths -->
<syscheck>
  <frequency>43200</frequency> <!-- 12 hours -->
  <scan_on_start>yes</scan_on_start>
  <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>
  <directories check_all="yes" realtime="yes">/boot</directories>
  <ignore>/etc/mtab</ignore>
  <ignore>/etc/hosts.deny</ignore>
  <ignore>/etc/mail/statistics</ignore>
  <ignore>/etc/random-seed</ignore>
  <ignore>/etc/adjtime</ignore>
  <ignore>/etc/httpd/logs</ignore>
  <skip_nfs>yes</skip_nfs>
</syscheck>

<!-- Vulnerability detection -->
<vulnerability-detector>
  <enabled>yes</enabled>
  <interval>12h</interval>
  <run_on_start>yes</run_on_start>
  <provider name="canonical">
    <enabled>yes</enabled>
    <os>focal</os>
    <os>jammy</os>
    <update_interval>1h</update_interval>
  </provider>
  <provider name="redhat">
    <enabled>yes</enabled>
    <update_interval>1h</update_interval>
  </provider>
  <provider name="nvd">
    <enabled>yes</enabled>
    <update_interval>1h</update_interval>
  </provider>
</vulnerability-detector>

<!-- Security Configuration Assessment (CIS benchmarks) -->
<sca>
  <enabled>yes</enabled>
  <scan_on_start>yes</scan_on_start>
  <interval>24h</interval>
</sca>
